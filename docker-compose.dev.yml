version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Mintfever28@ihsan
      DB_NAME: university_library
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:5000

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Mintfever28@ihsan
      MYSQL_DATABASE: university_library
    ports:
      - "3307:3307"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql